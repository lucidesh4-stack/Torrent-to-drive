services:
  - type: web
    name: streamly
    runtime: docker
    plan: free
    region: oregon
    rootDir: streamly_hardened
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true   # Render generates a strong random; persisted in dashboard
      - key: UPSTASH_REDIS_REST_URL
        sync: false           # paste in Render dashboard (Settings -> Environment)
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SESSION_TTL_SECONDS
        value: "43200"
