# CloudFlow regression gate — runs the verification harness on every push/PR.
#
# WHERE THIS RUNS: GitHub Actions. Your code lives on Hugging Face Spaces, so this
# only fires on push if the repo is ALSO on GitHub (e.g. you push to GitHub and
# mirror to HF, or you add a GitHub remote). If you do NOT use GitHub, use
# live-monitor.yml instead (it polls the deployed Space on a schedule).
#
# INSTALL: copy this file to  .github/workflows/ci.yml  in the GitHub repo, and
# make sure the bughunt/ folder (auto/run.py + auto/checks.py) is committed too.
#
# WHAT IT DOES: builds the real Flask app from the checked-out code and runs every
# issue check. Exit code = number of FAILs, so a regression fails the build.

name: regression-gate

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:   # lets you run it manually from the Actions tab

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app + harness deps
        run: |
          python -m pip install --upgrade pip
          # App deps (needed so the real Flask app boots for dynamic checks).
          if [ -f streamly/requirements.txt ]; then
            pip install -r streamly/requirements.txt
          else
            pip install flask telethon requests httpx
          fi

      - name: Lint — fail on real bug class (undefined names, use-before-assign, redefinition)
        run: |
          python -m pip install "ruff>=0.5"
          # BLOCKING: this is the bug class that shipped twice (B1/B2 = caught-but-not-imported names).
          #   F821 undefined name        F822 undefined name in __all__
          #   F811 redefinition          (F823 use-before-assign is intentionally NOT blocking: it
          #                               false-positives on conditional reassignment in telegram.py)
          ruff check --select F821,F822,F811 streamly/
          # NON-BLOCKING visibility: surface unused imports / dead locals without breaking the build.
          ruff check --select F401,F841,F823 --output-format concise streamly/ || true

      - name: Run verification harness against the checked-out code
        env:
          # CLOUDFLOW_ROOT points the harness at the dir CONTAINING streamly/.
          # For a repo where streamly/ is at the root, that's the workspace.
          CLOUDFLOW_ROOT: ${{ github.workspace }}
        run: |
          # Strict gate: BOM cleanup (case 13) shipped, so no --allow needed.
          # If a future cosmetic check must be non-blocking, add: --allow <ID>
          python3 bughunt/auto/run.py --json harness-report.json
          # run.py exits with the number of BLOCKING FAILs -> non-zero fails the job.

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-report
          path: harness-report.json
