name: deploy-to-hf

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history, needed to push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run regression gate before deploying
        run: |
          python -m pip install --upgrade pip
          if [ -f streamly/requirements.txt ]; then
            pip install -r streamly/requirements.txt
          else
            pip install flask telethon requests httpx
          fi
          # BLOCKING lint gate (same as ci.yml): undefined-name bug class must not deploy.
          python -m pip install "ruff>=0.5"
          ruff check --select F821,F822,F811 streamly/
          CLOUDFLOW_ROOT="${{ github.workspace }}" python3 bughunt/auto/run.py
          # If the gate fails (non-zero), the job stops here and does NOT deploy.

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git remote add space "https://lucidesh4:${HF_TOKEN}@huggingface.co/spaces/lucidesh4/cloudflow"
          git push --force space HEAD:main
